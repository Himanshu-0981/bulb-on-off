<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Turn on the light</title>
</head>
<body>
    <div class="main">
        <h1>Can you turn on the lights?</h1>
        <button class="btn" id="on" onclick="document.getElementById('myImage').src='images/onbulb.png'">Turn on Light</button>
        <img src="images/offbulb.png" alt="image" id="myImage">
        <button class="btn" id="off" onclick="document.getElementById('myImage').src='images/offbulb.png'">Turn off Light</button>
    </div>

</body>
</html>
